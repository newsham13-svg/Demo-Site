<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calz Ink · Tattoo Studio Bletchley, Milton Keynes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body {
        font-family: 'Inter', system-ui, sans-serif;
        background: #fafafa;
        color: #111;
        -webkit-font-smoothing: antialiased;
      }
      body > #root { min-height: 100vh; }
      a { color: inherit; text-decoration: none; }
      button { font: inherit; }
      [data-reveal] {
        opacity: 0;
        transform: translateY(22px);
        transition: opacity 0.65s cubic-bezier(.22,.68,0,1.2), transform 0.65s cubic-bezier(.22,.68,0,1.2);
      }
      [data-reveal].revealed {
        opacity: 1;
        transform: translateY(0);
      }
      [data-reveal][data-delay="1"] { transition-delay: 0.1s; }
      [data-reveal][data-delay="2"] { transition-delay: 0.2s; }
      [data-reveal][data-delay="3"] { transition-delay: 0.3s; }
      [data-reveal][data-delay="4"] { transition-delay: 0.4s; }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: #fafafa; }
      ::-webkit-scrollbar-thumb { background: #d4d4d4; }
      @media (prefers-reduced-motion: reduce) {
        [data-reveal] { opacity: 1; transform: none; transition: none; }
      }
    </style>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect, useRef, StrictMode } = React;

      const FontLoader = () => {
        useEffect(() => {
          document.title = 'Calz Ink · Tattoo Studio Bletchley, Milton Keynes';
        }, []);
        return null;
      };

      const useReveal = () => {
        useEffect(() => {
          const els = document.querySelectorAll('[data-reveal]');
          const observer = new IntersectionObserver((entries) => {
            entries.forEach((e) => {
              if (e.isIntersecting) {
                e.target.classList.add('revealed');
                observer.unobserve(e.target);
              }
            });
          }, { threshold: 0.12 });
          els.forEach((el) => observer.observe(el));
          return () => observer.disconnect();
        }, []);
      };

      const SERVICES = [
        { n: '01', title: 'Fine Line', desc: 'Precision single-needle work. Botanicals, geometry, portraits — rendered at the finest possible scale.' },
        { n: '02', title: 'Black & Grey', desc: 'Gradients built from restraint. Shadow, depth, and tonal range without a drop of colour.' },
        { n: '03', title: 'Lettering', desc: 'Type as tattoo. Custom scripts and serifs drawn for your skin, not lifted from a font file.' },
        { n: '04', title: 'Cover-ups', desc: 'Old work, rethought. We diagnose what is there and design something that earns its place.' },
      ];

      const PORTFOLIO = [
        { id: 1, src: '3.jpeg', alt: 'Fine line botanical tattoo on forearm — delicate fern leaves', cat: 'Fine Line' },
        { id: 2, src: '4.jpeg', alt: 'Black and grey portrait tattoo with deep shadow gradients', cat: 'Black & Grey' },
        { id: 3, src: '5.jpeg', alt: 'Minimal single-needle geometric tattoo on wrist', cat: 'Fine Line' },
        { id: 4, src: '6.jpeg', alt: 'Custom serif lettering tattoo on inner arm', cat: 'Lettering' },
        { id: 5, src: '7.jpeg', alt: 'Black and grey rose cover-up tattoo, shoulder placement', cat: 'Cover-ups' },
        { id: 6, src: '8.jpeg', alt: 'Fine line minimalist wave tattoo on ankle', cat: 'Fine Line' },
      ];

      const PROCESS = [
        { n: '1', title: 'Choose your style', desc: 'Browse the archive, follow our artists, and bring references — or arrive empty-handed. We will find the direction together.' },
        { n: '2', title: 'Book a consultation', desc: 'A free 30-minute session in-studio or over video. We discuss placement, sizing, and what the piece needs to look right in 20 years.' },
        { n: '3', title: 'Get your tattoo', desc: 'Custom design delivered before your appointment. A calm, considered session — no rush, no compromise.' },
      ];

      const TESTIMONIALS = [
        { quote: "I'd been putting off a cover-up for six years because every studio wanted to go darker. Calz Ink actually listened and came back with something lighter, braver — and it worked.", name: 'Maja T.', detail: 'Cover-up client, 2024' },
        { quote: 'The consultation alone changed how I thought about placement. That kind of spatial thinking is rare. The finished piece is exactly what I wanted and nothing I could have imagined alone.', name: 'Luca E.', detail: 'Fine Line, 2023' },
        { quote: 'Clean studio, no ego. The design felt like mine from the first draft — they drew toward my taste, not theirs.', name: 'Sofia R.', detail: 'Black & Grey client, 2024' },
      ];

      const STYLE_OPTIONS = ['Fine Line', 'Black & Grey', 'Lettering', 'Cover-up', 'Not sure yet'];

      const Arrow = () => <span style={{ display: 'inline-flex', transform: 'translateY(-1px)' }}>→</span>;

      function Nav({ onBookClick }) {
        const [scrolled, setScrolled] = useState(false);
        const [mobileOpen, setMobileOpen] = useState(false);

        useEffect(() => {
          const onScroll = () => setScrolled(window.scrollY > 40);
          window.addEventListener('scroll', onScroll, { passive: true });
          return () => window.removeEventListener('scroll', onScroll);
        }, []);

        const links = ['Services', 'Work', 'Artists', 'Process', 'Contact'];
        const scrollTo = (id) => {
          document.getElementById(id.toLowerCase())?.scrollIntoView({ behavior: 'smooth' });
          setMobileOpen(false);
        };

        return (
          <header style={{ position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100, transition: 'background 0.3s, border-color 0.3s, backdrop-filter 0.3s', background: scrolled ? 'rgba(250,250,250,0.88)' : 'transparent', backdropFilter: scrolled ? 'blur(12px)' : 'none', borderBottom: scrolled ? '1px solid #e5e5e5' : '1px solid transparent' }}>
            <nav style={{ maxWidth: 1200, margin: '0 auto', padding: '0 24px', height: 64, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <a href="#" onClick={(e) => { e.preventDefault(); scrollTo('contact'); }} style={{ fontFamily: "'Instrument Serif', Georgia, serif", fontSize: 22, color: '#111', textDecoration: 'none', letterSpacing: '-0.01em', display: 'flex', alignItems: 'baseline', gap: 4 }}>
                Calz<span style={{ fontFamily: "'Inter', sans-serif", fontSize: 11, fontWeight: 600, letterSpacing: '0.16em', textTransform: 'uppercase', color: '#555' }}>&nbsp;Ink</span>
              </a>
              <div style={{ display: 'flex', gap: 32, position: 'absolute', left: '50%', transform: 'translateX(-50%)' }} className="desktop-nav">
                {links.map((l) => (
                  <button key={l} onClick={() => scrollTo(l)} style={{ background: 'none', border: 'none', cursor: 'pointer', fontFamily: "'Inter', sans-serif", fontSize: 13, fontWeight: 500, letterSpacing: '0.02em', color: '#444', padding: '4px 0', transition: 'color 0.2s' }} onMouseEnter={(e) => e.currentTarget.style.color = '#111'} onMouseLeave={(e) => e.currentTarget.style.color = '#444'}>{l}</button>
                ))}
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                <button onClick={onBookClick} style={{ background: '#111', color: '#fff', border: 'none', padding: '9px 20px', fontSize: 13, fontWeight: 500, letterSpacing: '0.03em', cursor: 'pointer', borderRadius: 2, transition: 'background 0.2s', whiteSpace: 'nowrap' }} onMouseEnter={(e) => e.currentTarget.style.background = '#333'} onMouseLeave={(e) => e.currentTarget.style.background = '#111'} className="desktop-cta">Book consultation</button>
                <button onClick={() => setMobileOpen(!mobileOpen)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: '#111', display: 'none', padding: 4 }} aria-label={mobileOpen ? 'Close menu' : 'Open menu'} className="hamburger">{mobileOpen ? '×' : '☰'}</button>
              </div>
            </nav>
            {mobileOpen && (
              <div style={{ background: '#fafafa', borderTop: '1px solid #e5e5e5', padding: '20px 24px 28px' }}>
                {links.map((l) => (
                  <button key={l} onClick={() => scrollTo(l)} style={{ display: 'block', width: '100%', textAlign: 'left', background: 'none', border: 'none', cursor: 'pointer', fontFamily: "'Inter', sans-serif", fontSize: 16, fontWeight: 400, color: '#111', padding: '12px 0', borderBottom: '1px solid #ebebeb' }}>{l}</button>
                ))}
                <button onClick={() => { onBookClick(); setMobileOpen(false); }} style={{ marginTop: 20, background: '#111', color: '#fff', border: 'none', padding: '12px 24px', fontSize: 14, fontWeight: 500, cursor: 'pointer', borderRadius: 2, width: '100%' }}>Book consultation</button>
              </div>
            )}
            <style>{`@media (max-width: 768px) {.desktop-nav { display: none !important; } .desktop-cta { display: none !important; } .hamburger { display: flex !important; }}`}</style>
          </header>
        );
      }

      function Hero({ onBookClick }) {
        const scrollToWork = () => document.getElementById('work')?.scrollIntoView({ behavior: 'smooth' });
        return (
          <section style={{ paddingTop: 120, paddingBottom: 96, maxWidth: 1200, margin: '0 auto', padding: '120px 24px 96px', display: 'grid', gridTemplateColumns: '7fr 5fr', gap: 64, alignItems: 'center' }}>
            <div>
              <p data-reveal style={{ fontFamily: "'Inter', sans-serif", fontSize: 11, fontWeight: 600, letterSpacing: '0.16em', textTransform: 'uppercase', color: '#888', marginBottom: 28 }}>Est. 2014 · Bletchley, Milton Keynes</p>
              <h1 data-reveal data-delay="1" style={{ fontFamily: "'Instrument Serif', Georgia, serif", fontSize: 'clamp(52px, 7vw, 88px)', lineHeight: 1.05, letterSpacing: '-0.02em', color: '#111', marginBottom: 28 }}>Ink done <em style={{ fontStyle: 'italic', color: '#111' }}>right.</em></h1>
              <p data-reveal data-delay="2" style={{ fontFamily: "'Inter', sans-serif", fontSize: 17, lineHeight: 1.75, color: '#555', maxWidth: 460, marginBottom: 44, fontWeight: 300 }}>A design-led tattoo studio for considered, lasting work — from whisper-thin linework to full-colour compositions. No templates, no compromise.</p>
              <div data-reveal data-delay="3" style={{ display: 'flex', alignItems: 'center', gap: 28, flexWrap: 'wrap' }}>
                <button onClick={onBookClick} style={{ background: '#111', color: '#fff', border: 'none', padding: '14px 28px', fontSize: 14, fontWeight: 500, letterSpacing: '0.03em', cursor: 'pointer', borderRadius: 2, display: 'flex', alignItems: 'center', gap: 8, transition: 'background 0.2s' }} onMouseEnter={(e) => e.currentTarget.style.background = '#333'} onMouseLeave={(e) => e.currentTarget.style.background = '#111'}>Book a consultation <Arrow /></button>
                <button onClick={scrollToWork} style={{ background: 'none', border: 'none', cursor: 'pointer', fontFamily: "'Inter', sans-serif", fontSize: 14, fontWeight: 500, color: '#111', textDecoration: 'underline', textUnderlineOffset: 4, textDecorationColor: '#bbb', transition: 'text-decoration-color 0.2s', padding: 0 }} onMouseEnter={(e) => e.currentTarget.style.textDecorationColor = '#111'} onMouseLeave={(e) => e.currentTarget.style.textDecorationColor = '#bbb'}>See the work</button>
              </div>
            </div>
            <div data-reveal data-delay="2" style={{ position: 'relative' }}>
              <div style={{ aspectRatio: '4/5', overflow: 'hidden', borderRadius: 2, border: '1px solid #e5e5e5' }}>
                <img src="2.jpeg" alt="Artist at work — fine line tattooing in progress at Calz Ink studio" style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
              </div>
              <p style={{ marginTop: 12, fontFamily: "'Inter', sans-serif", fontSize: 11, color: '#aaa', letterSpacing: '0.06em', textTransform: 'uppercase' }}>Studio · Bletchley, Milton Keynes</p>
            </div>
            <style>{`@media (max-width: 768px) { section { grid-template-columns: 1fr !important; padding-top: 96px !important; } }`}</style>
          </section>
        );
      }

      function Services() {
        return (
          <section id="services" style={{ borderTop: '1px solid #e5e5e5', padding: '96px 24px', maxWidth: 1200, margin: '0 auto' }}>
            <p data-reveal style={{ fontFamily: "'Inter', sans-serif", fontSize: 11, fontWeight: 600, letterSpacing: '0.16em', textTransform: 'uppercase', color: '#888', marginBottom: 24 }}>01 — Services</p>
            <h2 data-reveal data-delay="1" style={{ fontFamily: "'Instrument Serif', Georgia, serif", fontSize: 'clamp(32px, 4vw, 52px)', lineHeight: 1.1, letterSpacing: '-0.02em', maxWidth: 560, marginBottom: 64 }}>Built around your idea, <em style={{ fontStyle: 'italic' }}>not ours.</em></h2>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', borderTop: '1px solid #e5e5e5' }}>
              {SERVICES.map((s, i) => (
                <div key={s.n} data-reveal data-delay={String(i + 1)} style={{ padding: '36px 28px', borderRight: i < 3 ? '1px solid #e5e5e5' : 'none', display: 'flex', flexDirection: 'column', gap: 16 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                    <span style={{ fontFamily: "'Inter', sans-serif", fontSize: 11, fontWeight: 600, letterSpacing: '0.12em', color: '#bbb' }}>{s.n}</span>
                    <span style={{ color: '#bbb', fontSize: 16 }}>→</span>
                  </div>
                  <h3 style={{ fontFamily: "'Instrument Serif', Georgia, serif", fontSize: 22, lineHeight: 1.2, color: '#111' }}>{s.title}</h3>
                  <p style={{ fontFamily: "'Inter', sans-serif", fontSize: 14, lineHeight: 1.7, color: '#666', fontWeight: 300 }}>{s.desc}</p>
                </div>
              ))}
            </div>
            <style>{`@media (max-width: 900px) { #services > div:last-of-type { grid-template-columns: repeat(2, 1fr) !important; } } @media (max-width: 560px) { #services > div:last-of-type { grid-template-columns: 1fr !important; } }`}</style>
          </section>
        );
      }

      const CATS = ['All', 'Fine Line', 'Black & Grey', 'Lettering'];
      function Portfolio() {
        const [active, setActive] = useState('All');
        const filtered = active === 'All' ? PORTFOLIO : PORTFOLIO.filter((p) => p.cat === active);
        return (
          <section id="work" style={{ borderTop: '1px solid #e5e5e5', padding: '96px 24px', maxWidth: 1200, margin: '0 auto' }}>
            <p data-reveal style={{ fontFamily: "'Inter', sans-serif", fontSize: 11, fontWeight: 600, letterSpacing: '0.16em', textTransform: 'uppercase', color: '#888', marginBottom: 24 }}>02 — Selected work</p>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', flexWrap: 'wrap', gap: 24, marginBottom: 48 }}>
              <h2 data-reveal data-delay="1" style={{ fontFamily: "'Instrument Serif', Georgia, serif", fontSize: 'clamp(28px, 3.5vw, 46px)', letterSpacing: '-0.02em', lineHeight: 1.1, maxWidth: 420 }}>A studio archive, <em style={{ fontStyle: 'italic' }}>quietly growing.</em></h2>
              <div data-reveal data-delay="2" style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                {CATS.map((c) => (
                  <button key={c} onClick={() => setActive(c)} style={{ background: active === c ? '#111' : 'transparent', color: active === c ? '#fff' : '#666', border: '1px solid', borderColor: active === c ? '#111' : '#ddd', padding: '7px 16px', fontSize: 12, fontWeight: 500, fontFamily: "'Inter', sans-serif", letterSpacing: '0.04em', cursor: 'pointer', borderRadius: 2, transition: 'all 0.2s' }}>{c}</button>
                ))}
              </div>
            </div>
            <div style={{ columns: '3', columnGap: 12 }}>
              {filtered.map((img) => (
                <div key={img.id} style={{ marginBottom: 12, breakInside: 'avoid', overflow: 'hidden', borderRadius: 2, border: '1px solid #ebebeb' }}>
                  <img src={img.src} alt={img.alt} loading="lazy" style={{ width: '100%', display: 'block', transition: 'transform 0.45s cubic-bezier(.22,.68,0,1)' }} onMouseEnter={(e) => e.currentTarget.style.transform = 'scale(1.03)'} onMouseLeave={(e) => e.currentTarget.style.transform = 'scale(1)'} />
                </div>
              ))}
            </div>
            <style>{`@media (max-width: 900px) { #work div[style*="columns: 3"] { columns: 2 !important; } } @media (max-width: 540px) { #work div[style*="columns: 2"] { columns: 1 !important; } }`}</style>
          </section>
        );
      }

      function Artists() {
        return (
          <section id="artists" style={{ borderTop: '1px solid #e5e5e5', padding: '96px 24px', maxWidth: 1200, margin: '0 auto' }}>
            <p data-reveal style={{ fontFamily: "'Inter', sans-serif", fontSize: 11, fontWeight: 600, letterSpacing: '0.16em', textTransform: 'uppercase', color: '#888', marginBottom: 24 }}>03 — Artists</p>
            <h2 data-reveal data-delay="1" style={{ fontFamily: "'Instrument Serif', Georgia, serif", fontSize: 'clamp(28px, 3.5vw, 46px)', letterSpacing: '-0.02em', lineHeight: 1.1, marginBottom: 56 }}>The hand behind the work.</h2>
            <div data-reveal data-delay="2" style={{ maxWidth: 340 }}>
              <div style={{ aspectRatio: '4/5', overflow: 'hidden', borderRadius: 2, border: '1px solid #e5e5e5', marginBottom: 20 }}>
                <img src="artist-photo.jpeg" alt="Callum — lead artist at Calz Ink studio" style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
              </div>
              <h3 style={{ fontFamily: "'Instrument Serif', Georgia, serif", fontSize: 26, marginBottom: 4 }}>Callum</h3>
              <p style={{ fontFamily: "'Inter', sans-serif", fontSize: 13, color: '#888', marginBottom: 14, letterSpacing: '0.02em' }}>Founder · Fine Line & Black/Grey</p>
              <a href="https://www.instagram.com/calz.tats/" target="_blank" rel="noopener noreferrer" style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontFamily: "'Inter', sans-serif", fontSize: 13, fontWeight: 500, color: '#111', textDecoration: 'none', borderBottom: '1px solid #111', paddingBottom: 2 }}>@calz.tats</a>
            </div>
          </section>
        );
      }

      function Process() {
        return (
          <section id="process" style={{ borderTop: '1px solid #e5e5e5', padding: '96px 24px', maxWidth: 1200, margin: '0 auto' }}>
            <p data-reveal style={{ fontFamily: "'Inter', sans-serif", fontSize: 11, fontWeight: 600, letterSpacing: '0.16em', textTransform: 'uppercase', color: '#888', marginBottom: 24 }}>04 — Process</p>
            <h2 data-reveal data-delay="1" style={{ fontFamily: "'Instrument Serif', Georgia, serif", fontSize: 'clamp(28px, 3.5vw, 46px)', letterSpacing: '-0.02em', lineHeight: 1.1, marginBottom: 64, maxWidth: 480 }}>Considered from the first conversation.</h2>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 0, borderTop: '1px solid #e5e5e5' }}>
              {PROCESS.map((p, i) => (
                <div key={p.n} data-reveal data-delay={String(i + 1)} style={{ padding: '48px 36px', borderRight: i < 2 ? '1px solid #e5e5e5' : 'none' }}>
                  <div style={{ fontFamily: "'Instrument Serif', Georgia, serif", fontSize: 72, lineHeight: 1, color: '#ebebeb', marginBottom: 20, letterSpacing: '-0.04em' }}>{p.n}</div>
                  <h3 style={{ fontFamily: "'Instrument Serif', Georgia, serif", fontSize: 22, marginBottom: 12, color: '#111' }}>{p.title}</h3>
                  <p style={{ fontFamily: "'Inter', sans-serif", fontSize: 14, lineHeight: 1.75, color: '#666', fontWeight: 300 }}>{p.desc}</p>
                </div>
              ))}
            </div>
            <style>{`@media (max-width: 768px) { #process > div:last-of-type { grid-template-columns: 1fr !important; } #process > div:last-of-type > div { border-right: none !important; border-bottom: 1px solid #e5e5e5; } }`}</style>
          </section>
        );
      }

      function Testimonials() {
        return (
          <section style={{ borderTop: '1px solid #e5e5e5', padding: '96px 24px', maxWidth: 1200, margin: '0 auto' }}>
            <p data-reveal style={{ fontFamily: "'Inter', sans-serif", fontSize: 11, fontWeight: 600, letterSpacing: '0.16em', textTransform: 'uppercase', color: '#888', marginBottom: 56 }}>05 — What clients say</p>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 0, borderTop: '1px solid #e5e5e5' }}>
              {TESTIMONIALS.map((t, i) => (
                <div key={i} data-reveal data-delay={String(i + 1)} style={{ padding: '48px 36px', borderRight: i < 2 ? '1px solid #e5e5e5' : 'none' }}>
                  <div style={{ fontFamily: "'Instrument Serif', Georgia, serif", fontSize: 72, lineHeight: 0.6, color: '#e0e0e0', marginBottom: 24, userSelect: 'none' }} aria-hidden="true">"</div>
                  <blockquote style={{ fontFamily: "'Instrument Serif', Georgia, serif", fontSize: 18, lineHeight: 1.65, color: '#222', marginBottom: 32, fontStyle: 'italic' }}>{t.quote}</blockquote>
                  <div style={{ borderTop: '1px solid #e5e5e5', paddingTop: 20 }}>
                    <p style={{ fontFamily: "'Inter', sans-serif", fontSize: 13, fontWeight: 600, color: '#111', marginBottom: 2 }}>{t.name}</p>
                    <p style={{ fontFamily: "'Inter', sans-serif", fontSize: 12, color: '#999', letterSpacing: '0.02em' }}>{t.detail}</p>
                  </div>
                </div>
              ))}
            </div>
            <style>{`@media (max-width: 768px) { section > div:last-of-type[style*="repeat(3"] { grid-template-columns: 1fr !important; } }`}</style>
          </section>
        );
      }

      function Contact({ contactRef }) {
        const [form, setForm] = useState({ name: '', email: '', style: '', message: '' });
        const [errors, setErrors] = useState({});
        const [submitting, setSubmitting] = useState(false);

        const validate = () => {
          const e = {};
          if (!form.name.trim()) e.name = 'Name is required';
          if (!form.email.trim()) e.email = 'Email is required';
          else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) e.email = 'Enter a valid email';
          if (!form.message.trim()) e.message = 'Tell us a little about your idea';
          return e;
        };

        const handleSubmit = () => {
          const e = validate();
          setErrors(e);
          if (Object.keys(e).length) return;
          setSubmitting(true);
          setTimeout(() => {
            setSubmitting(false);
            alert("Request received — we'll be in touch within 48 hours.");
            setForm({ name: '', email: '', style: '', message: '' });
            setErrors({});
          }, 800);
        };

        const inputStyle = (hasError) => ({ width: '100%', background: '#1a1a1a', border: `1px solid ${hasError ? '#e05252' : '#333'}`, color: '#fff', padding: '12px 14px', fontSize: 14, fontFamily: "'Inter', sans-serif", borderRadius: 2, outline: 'none', transition: 'border-color 0.2s' });
        const errorStyle = { fontFamily: "'Inter', sans-serif", fontSize: 12, color: '#e05252', marginTop: 4 };
        const labelStyle = { fontFamily: "'Inter', sans-serif", fontSize: 12, fontWeight: 500, letterSpacing: '0.08em', textTransform: 'uppercase', color: '#888', display: 'block', marginBottom: 8 };

        return (
          <section id="contact" ref={contactRef} style={{ background: '#111', padding: '96px 24px' }}>
            <div style={{ maxWidth: 1200, margin: '0 auto', display: 'grid', gridTemplateColumns: '1fr 1.4fr', gap: 80, alignItems: 'start' }}>
              <div>
                <p data-reveal style={{ fontFamily: "'Inter', sans-serif", fontSize: 11, fontWeight: 600, letterSpacing: '0.16em', textTransform: 'uppercase', color: '#666', marginBottom: 24 }}>06 — Find us</p>
                <h2 data-reveal data-delay="1" style={{ fontFamily: "'Instrument Serif', Georgia, serif", fontSize: 'clamp(28px, 3vw, 42px)', color: '#fff', letterSpacing: '-0.02em', lineHeight: 1.1, marginBottom: 48 }}>Let's talk about your idea.</h2>
                <div data-reveal data-delay="2" style={{ display: 'flex', flexDirection: 'column', gap: 28 }}>
                  {[
                    { label: 'Studio address', val: 'Bletchley, Milton Keynes' },
                    { label: 'Phone', val: '+45 31 44 82 07' },
                    { label: 'Hours', val: 'Tue – Sat · 10:00 – 18:00' },
                    { label: 'Instagram', val: '@calz.tats' },
                  ].map(({ label, val }) => (
                    <div key={label} style={{ display: 'flex', gap: 16, alignItems: 'flex-start' }}>
                      <div style={{ marginTop: 2 }}><span style={{ fontSize: 16, color: '#666' }}>•</span></div>
                      <div>
                        <p style={{ fontFamily: "'Inter', sans-serif", fontSize: 11, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', color: '#555', marginBottom: 2 }}>{label}</p>
                        {label === 'Instagram' ? (
                          <a href="https://www.instagram.com/calz.tats/" target="_blank" rel="noopener noreferrer" style={{ fontFamily: "'Inter', sans-serif", fontSize: 15, color: '#ccc', fontWeight: 300, textDecoration: 'none' }}>{val}</a>
                        ) : (
                          <p style={{ fontFamily: "'Inter', sans-serif", fontSize: 15, color: '#ccc', fontWeight: 300 }}>{val}</p>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
              <div data-reveal data-delay="2">
                <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
                  <div>
                    <label style={labelStyle}>Name</label>
                    <input type="text" value={form.name} placeholder="Your name" style={inputStyle(errors.name)} onChange={(e) => setForm({ ...form, name: e.target.value })} onFocus={(e) => e.currentTarget.style.borderColor = '#666'} onBlur={(e) => e.currentTarget.style.borderColor = errors.name ? '#e05252' : '#333'} />
                    {errors.name && <p style={errorStyle}>{errors.name}</p>}
                  </div>
                  <div>
                    <label style={labelStyle}>Email</label>
                    <input type="email" value={form.email} placeholder="you@example.com" style={inputStyle(errors.email)} onChange={(e) => setForm({ ...form, email: e.target.value })} onFocus={(e) => e.currentTarget.style.borderColor = '#666'} onBlur={(e) => e.currentTarget.style.borderColor = errors.email ? '#e05252' : '#333'} />
                    {errors.email && <p style={errorStyle}>{errors.email}</p>}
                  </div>
                  <div>
                    <label style={labelStyle}>Style (optional)</label>
                    <select value={form.style} style={{ ...inputStyle(false), appearance: 'none', cursor: 'pointer' }} onChange={(e) => setForm({ ...form, style: e.target.value })}>
                      <option value="">Select a style…</option>
                      {STYLE_OPTIONS.map((s) => <option key={s} value={s}>{s}</option>)}
                    </select>
                  </div>
                  <div>
                    <label style={labelStyle}>Your idea</label>
                    <textarea value={form.message} placeholder="Tell us what you have in mind — even a rough idea is enough to start." rows={5} style={{ ...inputStyle(errors.message), resize: 'vertical' }} onChange={(e) => setForm({ ...form, message: e.target.value })} onFocus={(e) => e.currentTarget.style.borderColor = '#666'} onBlur={(e) => e.currentTarget.style.borderColor = errors.message ? '#e05252' : '#333'} />
                    {errors.message && <p style={errorStyle}>{errors.message}</p>}
                  </div>
                  <button onClick={handleSubmit} disabled={submitting} style={{ background: submitting ? '#444' : '#fff', color: '#111', border: 'none', padding: '14px 28px', fontSize: 14, fontWeight: 600, letterSpacing: '0.04em', cursor: submitting ? 'not-allowed' : 'pointer', borderRadius: 2, transition: 'background 0.2s', fontFamily: "'Inter', sans-serif", display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }} onMouseEnter={(e) => { if (!submitting) e.currentTarget.style.background = '#e5e5e5'; }} onMouseLeave={(e) => { if (!submitting) e.currentTarget.style.background = '#fff'; }}>{submitting ? 'Sending…' : 'Send request'}</button>
                </div>
              </div>
            </div>
            <style>{`@media (max-width: 768px) { #contact > div { grid-template-columns: 1fr !important; gap: 48px !important; } }`}</style>
          </section>
        );
      }

      function Footer() {
        return (
          <footer style={{ background: '#111', borderTop: '1px solid #1e1e1e', padding: '36px 24px' }}>
            <div style={{ maxWidth: 1200, margin: '0 auto', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 16 }}>
              <span style={{ fontFamily: "'Instrument Serif', Georgia, serif", fontSize: 18, color: '#fff' }}>Calz <span style={{ fontFamily: "'Inter', sans-serif", fontSize: 10, fontWeight: 600, letterSpacing: '0.2em', textTransform: 'uppercase', color: '#666' }}>Ink</span></span>
              <p style={{ fontFamily: "'Inter', sans-serif", fontSize: 12, color: '#555' }}>A design-led studio for lasting work · Bletchley, Milton Keynes</p>
              <p style={{ fontFamily: "'Inter', sans-serif", fontSize: 12, color: '#444' }}>© {new Date().getFullYear()} Calz Ink</p>
            </div>
          </footer>
        );
      }

      function App() {
        useReveal();
        const contactRef = useRef(null);
        const scrollToContact = () => contactRef.current?.scrollIntoView({ behavior: 'smooth' });
        return (
          <>
            <FontLoader />
            <Nav onBookClick={scrollToContact} />
            <main>
              <Hero onBookClick={scrollToContact} />
              <Services />
              <Portfolio />
              <Artists />
              <Process />
              <Testimonials />
              <Contact contactRef={contactRef} />
            </main>
            <Footer />
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<StrictMode><App /></StrictMode>);
    </script>
  </body>
</html>
